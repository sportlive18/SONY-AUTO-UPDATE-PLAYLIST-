name: Auto Update Stream

on:
  schedule:
    - cron: '*/7 * * * *' 
  workflow_dispatch: # Allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        run: python sayan-sony.py

      - name: Commit and push changes
        run: |
          git config --local user.name "sportlive18"
          git config --local user.email "271363488+sportlive18@users.noreply.github.com"
          git add stream.json stream.m3u
          git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
